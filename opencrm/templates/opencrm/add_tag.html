{% extends "opencrm/base.html" %}
{% load widget_tweaks %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Add Tag</h1>
    {% url 'opencrm:tags' as tags_url %}
    <a href="{{ tags_url }}" class="btn btn-outline-secondary">
        Back to Tags
    </a>
</div>

<div class="card shadow-sm p-4 mb-4">
    {% include "opencrm/partials/edit_form.html" with form=form submit_text="Add Tag" cancel_url=tags_url %}
</div>

{% endblock %}
