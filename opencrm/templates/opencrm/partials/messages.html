{% if messages %}
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    {% for message in messages %}

    <div class="toast align-items-center border-0 mb-2
        {% if message.tags == 'error' %} text-bg-danger
        {% elif message.tags == 'success' %} text-bg-success
        {% elif message.tags == 'warning' %} text-bg-warning
        {% elif message.tags == 'info' %} text-bg-info
        {% else %} text-bg-secondary
        {% endif %}" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">

        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>

    {% endfor %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll('.toast').forEach(function (toastEl) {
            new bootstrap.Toast(toastEl).show();
        });
    });
</script>
{% endif %}
