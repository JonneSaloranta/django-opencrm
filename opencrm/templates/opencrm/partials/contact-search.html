{% load static %}


<script src="{% static 'opencrm/js/contact-search.js' %}" defer></script>

<div class="card mb-4 shadow-sm">
    <div class="card-body">

        <!-- Search input + results container -->
        <div class="position-relative">
            <input type="text" id="contact-search" data-url="{% url 'opencrm:contact_search_api' %}" class="form-control" placeholder="Search companies..." autocomplete="off">

            <!-- Results dropdown -->
            <ul id="contact-results" class="list-group position-absolute w-100" style="z-index: 1000; display: none; max-height: 300px; overflow-y: auto;">
                <!-- JS will fill this -->
            </ul>
        </div>

        <!-- Filters row (horizontal) -->
        <div class="d-flex flex-wrap gap-3 mt-3 align-items-center">

            <!-- Has open tasks -->
            <div class="form-check d-flex align-items-center">
                <input type="checkbox" class="form-check-input me-2" id="filter-open-tasks">
                <label class="form-check-label mb-0" for="filter-open-tasks">Has open tasks</label>
            </div>

            <!-- Not contacted in last X days -->
            <div class="d-flex align-items-center">
                <label for="filter-days" class="me-2 mb-0">Not contacted in last:</label>
                <input type="number" id="filter-days" class="form-control" placeholder="days" min="1" style="width: 100px;">
            </div>

            <!-- Tag select -->
            <div class="d-flex align-items-center">
                <label for="filter-tag" class="me-2 mb-0">Tag:</label>
                <select id="filter-tag" class="form-select" data-url="{% url 'opencrm:all_tags_api' %}" style="width: 150px;">
                    <option value="">All</option>
                </select>
            </div>

        </div>
    </div>
</div>
