{% load static %}

{% include "opencrm/partials/contact-search.html" %}

<h3>Upcoming Tasks</h3>
<ul id="tasks">
    <li>Loading...</li>
</ul>

<script>
    const list = document.getElementById("tasks");

    function timeUntil(dueDateStr) {
        if (!dueDateStr) return "No due date";
        const now = new Date();
        const due = new Date(dueDateStr);
        const diffMs = due - now;

        if (diffMs <= 0) return "Overdue";

        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const diffHours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
        const diffMinutes = Math.floor((diffMs / (1000 * 60)) % 60);

        if (diffDays > 0) return `in ${diffDays} day${diffDays > 1 ? "s" : ""}`;
        if (diffHours > 0) return `in ${diffHours} hour${diffHours > 1 ? "s" : ""}`;
        return `in ${diffMinutes} min${diffMinutes > 1 ? "s" : ""}`;
    }

    fetch("{% url 'opencrm:upcoming_tasks' %}")
        .then(res => res.json())
        .then(tasks => {
            if (!tasks.length) {
                list.innerHTML = "<li>No upcoming tasks</li>";
                return;
            }

            list.innerHTML = tasks.map(t => `
            <li>
                <a href="${t.contact_url}">${t.contact_name}</a>, 
                <a href="${t.task_url}">${t.task_text}</a>, 
                <span title="${t.due_date}">${timeUntil(t.due_date)}</span>
            </li>
        `).join("");
        })
        .catch(err => {
            console.error(err);
            list.innerHTML = "<li>Error loading tasks</li>";
        });
</script>
