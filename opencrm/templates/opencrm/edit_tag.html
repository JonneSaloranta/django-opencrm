{% extends "opencrm/base.html" %}
{% load widget_tweaks %}

{% block content %}

    <a href="{% url 'opencrm:tags' %}" class="btn btn-primary">
        Back to Tags

</div>

<div class="card shadow-sm p-4 mb-4">
    {% include "opencrm/partials/edit_form.html" with form=form submit_text="Save Changes" cancel_url=cancel_url %}
</div>

{% endblock %}
